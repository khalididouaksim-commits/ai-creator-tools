<!-- generators/thumbnail-generator.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thumbnail Generator</title>

<link rel="stylesheet" href="../style.css">

<style>

body{
  background:#050816;
  color:white;
  font-family:Arial;
  padding:20px;
}

.container{
  max-width:1100px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

select,button{
  padding:14px;
  border:none;
  border-radius:12px;
  background:#111827;
  color:white;
  font-size:16px;
}

button{
  cursor:pointer;
  background:linear-gradient(90deg,#7c3aed,#06b6d4);
  font-weight:bold;
}

.results-grid{
  display:grid;
  gap:20px;
  margin-top:35px;
}

.thumb-card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:18px;
  padding:20px;
}

.thumb-title{
  font-size:26px;
  font-weight:bold;
  margin-bottom:20px;
  color:#06b6d4;
  text-transform:uppercase;
}

.section-box{
  background:#0f172a;
  padding:14px;
  border-radius:12px;
  border:1px solid #1e293b;
  margin-bottom:14px;
}

.section-box strong{
  display:block;
  margin-bottom:8px;
  color:#8b5cf6;
}

.card-buttons{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.small-btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#1f2937;
  color:white;
}

.page-section{
  margin-top:50px;
}

.section-title{
  margin-bottom:20px;
  font-size:24px;
}

.mini-card{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:15px;
  border-radius:14px;
  margin-bottom:12px;
}

</style>

</head>
<body>

<div class="container">

<h1>🖼️ AI Thumbnail Generator</h1>

<div class="controls">

<select id="platform">
  <option>YouTube</option>
  <option>YouTube Shorts</option>
  <option>TikTok</option>
</select>

<select id="genre">
  <option>Mystery</option>
  <option>Science</option>
  <option>History</option>
  <option>Finance</option>
  <option>Gaming</option>
  <option>Motivation</option>
</select>

<select id="style">
  <option>Cinematic</option>
  <option>Viral</option>
  <option>Dark</option>
  <option>MrBeast Style</option>
  <option>Documentary</option>
</select>

<select id="emotion">
  <option>Shock</option>
  <option>Fear</option>
  <option>Curiosity</option>
  <option>Excitement</option>
  <option>Suspense</option>
</select>

<button onclick="generateThumbnails()">
Generate 5 Thumbnails
</button>

</div>

<div class="results-grid" id="resultsGrid"></div>

<div class="page-section">

<h2 class="section-title">⭐ Saved Thumbnails</h2>

<div id="savedThumbnails"></div>

</div>

<div class="page-section">

<h2 class="section-title">🕘 History</h2>

<div id="history"></div>

</div>

</div>

<script>

const titles = [
  "THEY FOUND SOMETHING IMPOSSIBLE",
  "THIS CHANGED EVERYTHING",
  "NOBODY WAS READY FOR THIS",
  "THE SECRET WAS FINALLY REVEALED",
  "SCIENTISTS CAN'T EXPLAIN THIS",
  "THIS VIDEO SHOULD NOT EXIST",
  "THEY OPENED THE WRONG DOOR"
];

const faces = [
  "terrified face",
  "shocked expression",
  "screaming person",
  "confused reaction",
  "intense eye contact"
];

const backgrounds = [
  "dark laboratory",
  "abandoned bunker",
  "mysterious forest",
  "futuristic city",
  "ancient underground tunnel"
];

const objects = [
  "glowing artifact",
  "mysterious creature",
  "hidden document",
  "massive explosion",
  "secret machine"
];

const lighting = [
  "dramatic shadows",
  "red cinematic lighting",
  "neon glow",
  "high contrast lighting",
  "dark atmosphere"
];

const compositions = [
  "Face on left, object on right",
  "Close-up face with blurred background",
  "Large bold text in center",
  "Object highlighted with red circle",
  "Split-screen dramatic composition"
];

const colors = [
  "Red + Black",
  "Yellow + Dark Blue",
  "Purple + Black",
  "Orange + Dark Gray",
  "White + Red"
];

function randomItem(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateThumbnails(){

  const genre =
  document.getElementById("genre").value;

  const style =
  document.getElementById("style").value;

  const emotion =
  document.getElementById("emotion").value;

  const platform =
  document.getElementById("platform").value;

  const grid =
  document.getElementById("resultsGrid");

  grid.innerHTML = "";

  let generated = [];

  for(let i=0;i<5;i++){

    const title = randomItem(titles);

    const prompt = `
${randomItem(faces)},
${randomItem(backgrounds)},
${randomItem(objects)},
${style} style,
${emotion} emotion,
${randomItem(lighting)},
ultra realistic,
high contrast ${platform} thumbnail
`;

    const composition =
    randomItem(compositions);

    const color =
    randomItem(colors);

    const fullData = `
TITLE:
${title}

PROMPT:
${prompt}

COMPOSITION:
${composition}

COLORS:
${color}
`;

    generated.push(fullData);

    grid.innerHTML += `

    <div class="thumb-card">

      <div class="thumb-title">
        ${title}
      </div>

      <div class="section-box">
        <strong>🎨 Prompt</strong>
        ${prompt}
      </div>

      <div class="section-box">
        <strong>🧩 Composition</strong>
        ${composition}
      </div>

      <div class="section-box">
        <strong>🌈 Recommended Colors</strong>
        ${color}
      </div>

      <div class="card-buttons">

        <button class="small-btn"
        onclick='copyThumbnail(${JSON.stringify(fullData)})'>
        Copy
        </button>

        <button class="small-btn"
        onclick='saveThumbnail(${JSON.stringify(fullData)})'>
        Save
        </button>

      </div>

    </div>

    `;
  }

  saveHistory(generated);
}

function copyThumbnail(text){

  navigator.clipboard.writeText(text);

  alert("Thumbnail copied!");
}

function saveThumbnail(data){

  let saved =
  JSON.parse(localStorage.getItem("savedThumbnails")) || [];

  saved.push(data);

  localStorage.setItem(
    "savedThumbnails",
    JSON.stringify(saved)
  );

  loadSaved();
}

function loadSaved(){

  let saved =
  JSON.parse(localStorage.getItem("savedThumbnails")) || [];

  const container =
  document.getElementById("savedThumbnails");

  container.innerHTML = "";

  saved.forEach(item => {

    container.innerHTML += `
      <div class="mini-card">
        <pre style="white-space:pre-wrap;color:white">${item}</pre>
      </div>
    `;
  });
}

function saveHistory(data){

  let history =
  JSON.parse(localStorage.getItem("thumbnailHistory")) || [];

  history.unshift({
    date:new Date().toLocaleString(),
    data:data
  });

  localStorage.setItem(
    "thumbnailHistory",
    JSON.stringify(history)
  );

  loadHistory();
}

function loadHistory(){

  let history =
  JSON.parse(localStorage.getItem("thumbnailHistory")) || [];

  const container =
  document.getElementById("history");

  container.innerHTML = "";

  history.slice(0,10).forEach(item => {

    let html = item.data.map(d => `
      <pre style="white-space:pre-wrap;color:white">
${d}
      </pre>
    `).join("");

    container.innerHTML += `

      <div class="mini-card">

        <strong>${item.date}</strong>

        <div style="margin-top:10px">
          ${html}
        </div>

      </div>

    `;
  });
}

loadSaved();
loadHistory();

</script>

</body>
</html>
