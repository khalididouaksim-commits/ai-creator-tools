<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد الثمبنيل - Content Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .generator-page {
            padding: 3rem 0;
            min-height: calc(100vh - 300px);
        }
        
        .generator-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .generator-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .generator-header h1 {
            color: var(--dark-color);
            margin-bottom: 0.5rem;
        }
        
        .thumbnail-builder {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
        }
        
        .controls-panel {
            background: var(--light-color);
            padding: 1.5rem;
            border-radius: 12px;
            height: fit-content;
        }
        
        .preview-panel {
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 12px;            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--dark-color);
        }
        
        .form-group input[type="text"],
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        .form-group input[type="text"]:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .color-picker-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .color-option {
            position: relative;
        }
                .color-option input[type="color"] {
            width: 60px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .color-option input[type="color"]:hover {
            transform: scale(1.1);
            border-color: var(--primary-color);
        }
        
        .color-option label {
            display: block;
            font-size: 0.85rem;
            margin-top: 0.25rem;
            text-align: center;
        }
        
        .template-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .template-option {
            border: 3px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        
        .template-option:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }
        
        .template-option.active {
            border-color: var(--primary-color);
            background: rgba(99, 102, 241, 0.1);
        }
        
        .template-option i {
            font-size: 2rem;
            color: var(--primary-color);            margin-bottom: 0.5rem;
        }
        
        /* Thumbnail Preview */
        #thumbnailCanvas {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: center;
        }
        
        .btn-download {
            padding: 1rem 2rem;
            font-size: 1.1rem;
        }
        
        .size-indicator {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        @media (max-width: 968px) {
            .thumbnail-builder {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <i class="fas fa-bolt"></i>
                <span>Content Tools</span>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">الرئيسية</a></li>
                <li><a href="../index.html#generators">الأدوات</a></li>            </ul>
        </div>
    </nav>

    <!-- Thumbnail Generator Page -->
    <section class="generator-page">
        <div class="container">
            <div class="generator-container">
                <div class="generator-header">
                    <h1><i class="fas fa-image"></i> مولد الثمبنيل</h1>
                    <p>صمم ثمبنيل احترافي لمقاطعك في دقائق</p>
                </div>
                
                <div class="thumbnail-builder">
                    <!-- Controls Panel -->
                    <div class="controls-panel">
                        <h3 style="margin-bottom: 1.5rem; color: var(--dark-color);">
                            <i class="fas fa-sliders-h"></i> الإعدادات
                        </h3>
                        
                        <!-- Template Selection -->
                        <div class="form-group">
                            <label>القالب</label>
                            <div class="template-grid">
                                <div class="template-option active" data-template="bold">
                                    <i class="fas fa-bold"></i>
                                    <div>عريض</div>
                                </div>
                                <div class="template-option" data-template="minimal">
                                    <i class="fas fa-minus"></i>
                                    <div>بسيط</div>
                                </div>
                                <div class="template-option" data-template="gradient">
                                    <i class="fas fa-layer-group"></i>
                                    <div>متدرج</div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Main Text -->
                        <div class="form-group">
                            <label>النص الرئيسي</label>
                            <input type="text" id="mainText" placeholder="مثال: 10 نصائح ذهبية" value="عنوان جذاب">
                        </div>
                        
                        <!-- Subtitle -->
                        <div class="form-group">
                            <label>النص الثانوي</label>
                            <input type="text" id="subText" placeholder="مثال: شاهد الآن!" value="لا تفوت الفرصة">
                        </div>                        
                        <!-- Background Color -->
                        <div class="form-group">
                            <label>لون الخلفية</label>
                            <div class="color-picker-group">
                                <div class="color-option">
                                    <input type="color" id="bgColor" value="#6366f1">
                                    <label>أساسي</label>
                                </div>
                                <div class="color-option">
                                    <input type="color" id="bgColor2" value="#8b5cf6">
                                    <label>ثانوي</label>
                                </div>
                                <div class="color-option">
                                    <input type="color" id="textColor" value="#ffffff">
                                    <label>النص</label>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Font Size -->
                        <div class="form-group">
                            <label>حجم الخط الرئيسي</label>
                            <select id="fontSize">
                                <option value="40">صغير</option>
                                <option value="60" selected>متوسط</option>
                                <option value="80">كبير</option>
                                <option value="100">كبير جداً</option>
                            </select>
                        </div>
                        
                        <!-- Text Position -->
                        <div class="form-group">
                            <label>موضع النص</label>
                            <select id="textPosition">
                                <option value="center">وسط</option>
                                <option value="top">أعلى</option>
                                <option value="bottom">أسفل</option>
                                <option value="left">يسار</option>
                                <option value="right">يمين</option>
                            </select>
                        </div>
                        
                        <!-- Add Icon -->
                        <div class="form-group">
                            <label>أيقونة</label>
                            <select id="iconSelect">
                                <option value="none">بدون أيقونة</option>
                                <option value="play">▶ تشغيل</option>
                                <option value="star">⭐ نجمة</option>                                <option value="fire">🔥 نار</option>
                                <option value="bolt">⚡ صاعقة</option>
                                <option value="target">🎯 هدف</option>
                            </select>
                        </div>
                        
                        <button onclick="downloadThumbnail()" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                            <i class="fas fa-download"></i>
                            تحميل الثمبنيل
                        </button>
                    </div>
                    
                    <!-- Preview Panel -->
                    <div class="preview-panel">
                        <div>
                            <div class="size-indicator">
                                <i class="fas fa-ruler-combined"></i>
                                1280 x 720 بكسل (YouTube)
                            </div>
                            <canvas id="thumbnailCanvas" width="1280" height="720"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Content Tools. جميع الحقوق محفوظة</p>
            </div>
        </div>
    </footer>

    <script>
        const canvas = document.getElementById('thumbnailCanvas');
        const ctx = canvas.getContext('2d');
        
        // Current settings
        let settings = {
            template: 'bold',
            mainText: 'عنوان جذاب',
            subText: 'لا تفوت الفرصة',
            bgColor: '#6366f1',
            bgColor2: '#8b5cf6',
            textColor: '#ffffff',
            fontSize: 60,
            textPosition: 'center',            icon: 'none'
        };
        
        // Update settings from inputs
        function updateSettings() {
            settings.mainText = document.getElementById('mainText').value;
            settings.subText = document.getElementById('subText').value;
            settings.bgColor = document.getElementById('bgColor').value;
            settings.bgColor2 = document.getElementById('bgColor2').value;
            settings.textColor = document.getElementById('textColor').value;
            settings.fontSize = parseInt(document.getElementById('fontSize').value);
            settings.textPosition = document.getElementById('textPosition').value;
            settings.icon = document.getElementById('iconSelect').value;
            
            drawThumbnail();
        }
        
        // Draw thumbnail
        function drawThumbnail() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background based on template
            if (settings.template === 'bold') {
                drawBoldBackground();
            } else if (settings.template === 'minimal') {
                drawMinimalBackground();
            } else if (settings.template === 'gradient') {
                drawGradientBackground();
            }
            
            // Draw text
            drawText();
            
            // Draw icon
            if (settings.icon !== 'none') {
                drawIcon();
            }
        }
        
        function drawBoldBackground() {
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, settings.bgColor);
            gradient.addColorStop(1, settings.bgColor2);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Add geometric shapes
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.beginPath();            ctx.arc(100, 100, 150, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(canvas.width - 100, canvas.height - 100, 200, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawMinimalBackground() {
            ctx.fillStyle = settings.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Add subtle pattern
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 2;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
        }
        
        function drawGradientBackground() {
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, settings.bgColor);
            gradient.addColorStop(0.5, settings.bgColor2);
            gradient.addColorStop(1, settings.bgColor);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Add glow effect
            const glowGradient = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 0,
                canvas.width / 2, canvas.height / 2, 400
            );
            glowGradient.addColorStop(0, 'rgba(255, 255, 255, 0.2)');
            glowGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        function drawText() {
            ctx.fillStyle = settings.textColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Draw main text
            ctx.font = `bold ${settings.fontSize}px 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif`;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;
            
            let yPos;
            if (settings.textPosition === 'top') {
                yPos = 200;
            } else if (settings.textPosition === 'bottom') {
                yPos = 520;
            } else {
                yPos = canvas.height / 2 - 50;
            }
            
            ctx.fillText(settings.mainText, canvas.width / 2, yPos);
            
            // Draw subtitle
            ctx.font = `${settings.fontSize * 0.6}px 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif`;
            ctx.shadowBlur = 5;
            ctx.fillText(settings.subText, canvas.width / 2, yPos + 80);
            
            // Reset shadow
            ctx.shadowColor = 'transparent';
        }
        
        function drawIcon() {
            const icons = {
                'play': '▶',
                'star': '⭐',
                'fire': '🔥',
                'bolt': '⚡',
                'target': '🎯'
            };
            
            ctx.font = '100px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(icons[settings.icon], canvas.width - 100, 100);
        }
        
        // Download thumbnail
        function downloadThumbnail() {
            const link = document.createElement('a');
            link.download = `thumbnail-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
        
        // Template selection
        document.querySelectorAll('.template-option').forEach(option => {
            option.addEventListener('click', function() {                document.querySelectorAll('.template-option').forEach(o => o.classList.remove('active'));
                this.classList.add('active');
                settings.template = this.dataset.template;
                drawThumbnail();
            });
        });
        
        // Event listeners
        document.getElementById('mainText').addEventListener('input', updateSettings);
        document.getElementById('subText').addEventListener('input', updateSettings);
        document.getElementById('bgColor').addEventListener('input', updateSettings);
        document.getElementById('bgColor2').addEventListener('input', updateSettings);
        document.getElementById('textColor').addEventListener('input', updateSettings);
        document.getElementById('fontSize').addEventListener('change', updateSettings);
        document.getElementById('textPosition').addEventListener('change', updateSettings);
        document.getElementById('iconSelect').addEventListener('change', updateSettings);
        
        // Initial draw
        drawThumbnail();
    </script>
</body>
</html>
