<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thumbnail Generator</title>

<link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="container generator-container">

<h1 class="page-title">🖼️ Thumbnail Generator</h1>

<div class="controls">

<select id="genre">
  <option>Horror</option>
  <option>Science</option>
  <option>Finance</option>
</select>

<button onclick="generateThumbs()">
Generate Thumbnails
</button>

</div>

<div class="results-grid" id="results"></div>

</div>

<script>

const thumbnailData = {

  Horror:[
    "dark forest, terrified face, cinematic lighting",
    "haunted hospital, ghost creature, red shadows"
  ],

  Science:[
    "futuristic laboratory, shocked scientist, neon lighting",
    "space station, glowing machine, cinematic atmosphere"
  ],

  Finance:[
    "luxury office, rich businessman, money stacks",
    "stock market, millionaire, luxury car"
  ]

};

function randomItem(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateThumbs(){

  const genre =
  document.getElementById("genre").value;

  const data =
  thumbnailData[genre];

  const results =
  document.getElementById("results");

  results.innerHTML = "";

  for(let i=0;i<5;i++){

    const thumb =
    randomItem(data);

    results.innerHTML += `

    <div class="result-card">

      <div class="result-box">
        ${thumb}
      </div>

    </div>

    `;
  }
}

</script>

</body>
</html>
