<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Script Generator</title>

<link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="container generator-container">

<h1 class="page-title">🎬 Script Generator</h1>

<div class="controls">

<select id="genre">
  <option>Horror</option>
  <option>Science</option>
  <option>Finance</option>
</select>

<button onclick="generateScripts()">
Generate Scripts
</button>

</div>

<div class="results-grid" id="results"></div>

</div>

<script>

const scriptData = {

  Horror:[
    "A group entered a haunted tunnel and never returned.",
    "The camera captured a terrifying creature underground."
  ],

  Science:[
    "Scientists created a machine capable of changing reality.",
    "NASA discovered a strange signal from deep space."
  ],

  Finance:[
    "A young entrepreneur built a million-dollar business.",
    "This investment strategy changed his life forever."
  ]

};

function randomItem(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateScripts(){

  const genre =
  document.getElementById("genre").value;

  const data =
  scriptData[genre];

  const results =
  document.getElementById("results");

  results.innerHTML = "";

  for(let i=0;i<3;i++){

    const script =
    randomItem(data);

    results.innerHTML += `

    <div class="result-card">

      <div class="result-box">
        ${script}
      </div>

    </div>

    `;
  }
}

</script>

</body>
</html>
