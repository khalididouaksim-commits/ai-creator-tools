<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Title Generator</title>

<link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="container generator-container">

<h1 class="page-title">🏷️ Title Generator</h1>

<div class="controls">

<select id="genre">
  <option>Horror</option>
  <option>Science</option>
  <option>Finance</option>
</select>

<button onclick="generateTitles()">
Generate Titles
</button>

</div>

<div class="results-grid" id="results"></div>

</div>

<script>

const titleData = {

  Horror:[
    "DON'T WATCH THIS ALONE",
    "THE CREATURE WAS REAL",
    "THIS VIDEO IS TERRIFYING"
  ],

  Science:[
    "SCIENTISTS DISCOVERED THIS",
    "THIS CHANGED PHYSICS",
    "NASA HID THIS"
  ],

  Finance:[
    "THIS BUSINESS MADE MILLIONS",
    "THE MONEY SECRET",
    "HE BECAME RICH OVERNIGHT"
  ]

};

function randomItem(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateTitles(){

  const genre =
  document.getElementById("genre").value;

  const data =
  titleData[genre];

  const results =
  document.getElementById("results");

  results.innerHTML = "";

  for(let i=0;i<5;i++){

    const title =
    randomItem(data);

    results.innerHTML += `

    <div class="result-card">

      <div class="result-title">
        ${title}
      </div>

    </div>

    `;
  }
}

</script>

</body>
</html>
