<!-- generators/title-generator.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Title Generator</title>

<link rel="stylesheet" href="../style.css">

<style>

body{
  background:#050816;
  color:white;
  font-family:Arial;
  padding:20px;
}

.container{
  max-width:1100px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

select,button{
  padding:14px;
  border:none;
  border-radius:12px;
  background:#111827;
  color:white;
  font-size:16px;
}

button{
  cursor:pointer;
  background:linear-gradient(90deg,#7c3aed,#06b6d4);
  font-weight:bold;
}

.results-grid{
  display:grid;
  gap:20px;
  margin-top:35px;
}

.title-card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:18px;
  padding:20px;
}

.main-title{
  font-size:28px;
  font-weight:bold;
  line-height:1.5;
  margin-bottom:20px;
  color:#06b6d4;
}

.info-box{
  background:#0f172a;
  padding:14px;
  border-radius:12px;
  border:1px solid #1e293b;
  margin-bottom:14px;
}

.info-box strong{
  display:block;
  margin-bottom:8px;
  color:#8b5cf6;
}

.card-buttons{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.small-btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#1f2937;
  color:white;
}

.page-section{
  margin-top:50px;
}

.section-title{
  margin-bottom:20px;
  font-size:24px;
}

.mini-card{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:15px;
  border-radius:14px;
  margin-bottom:12px;
}

</style>

</head>
<body>

<div class="container">

<h1>🏷️ AI Title Generator</h1>

<div class="controls">

<select id="platform">
  <option>YouTube</option>
  <option>YouTube Shorts</option>
  <option>TikTok</option>
  <option>Instagram Reels</option>
</select>

<select id="genre">
  <option>Mystery</option>
  <option>Science</option>
  <option>History</option>
  <option>Finance</option>
  <option>Gaming</option>
  <option>Motivation</option>
</select>

<select id="tone">
  <option>Viral</option>
  <option>Dark</option>
  <option>Suspense</option>
  <option>Emotional</option>
  <option>Funny</option>
</select>

<select id="style">
  <option>MrBeast Style</option>
  <option>Documentary</option>
  <option>Cinematic</option>
  <option>Curiosity</option>
  <option>Breaking News</option>
</select>

<button onclick="generateTitles()">
Generate 5 Titles
</button>

</div>

<div class="results-grid" id="resultsGrid"></div>

<div class="page-section">

<h2 class="section-title">⭐ Saved Titles</h2>

<div id="savedTitles"></div>

</div>

<div class="page-section">

<h2 class="section-title">🕘 History</h2>

<div id="history"></div>

</div>

</div>

<script>

const starters = [
  "Nobody Expected",
  "Scientists Discovered",
  "This Changed",
  "The Truth About",
  "What Happened To",
  "They Found",
  "The Secret Behind",
  "Why Nobody Talks About"
];

const subjects = [
  "This Experiment",
  "The Lost City",
  "This Mystery",
  "The Hidden Tunnel",
  "This Creature",
  "The Ancient Artifact",
  "The Forbidden Document",
  "This Dangerous Mistake"
];

const endings = [
  "Will Shock You",
  "Caught On Camera",
  "Changed History Forever",
  "Nobody Can Explain",
  "Still Terrifies Scientists",
  "Was Hidden For Years",
  "Went Completely Wrong"
];

const emotions = [
  "😱",
  "🔥",
  "🤯",
  "⚠️",
  "👀"
];

const ctrTips = [
  "High curiosity title",
  "Perfect for Shorts",
  "Strong emotional trigger",
  "Excellent click potential",
  "Viral-style wording"
];

function randomItem(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateTitles(){

  const platform =
  document.getElementById("platform").value;

  const genre =
  document.getElementById("genre").value;

  const tone =
  document.getElementById("tone").value;

  const style =
  document.getElementById("style").value;

  const grid =
  document.getElementById("resultsGrid");

  grid.innerHTML = "";

  let generated = [];

  for(let i=0;i<5;i++){

    const title = `
${randomItem(emotions)}
${randomItem(starters)}
${randomItem(subjects)}
${randomItem(endings)}
`;

    const score =
    Math.floor(Math.random() * 20) + 80;

    const tip =
    randomItem(ctrTips);

    const fullData = `
TITLE:
${title}

CTR SCORE:
${score}/100

TIP:
${tip}
`;

    generated.push(fullData);

    grid.innerHTML += `

    <div class="title-card">

      <div class="main-title">
        ${title}
      </div>

      <div class="info-box">
        <strong>📈 CTR Score</strong>
        ${score}/100
      </div>

      <div class="info-box">
        <strong>💡 Optimization Tip</strong>
        ${tip}
      </div>

      <div class="info-box">
        <strong>🎯 Platform</strong>
        ${platform}
      </div>

      <div class="info-box">
        <strong>🎬 Style</strong>
        ${style}
      </div>

      <div class="card-buttons">

        <button class="small-btn"
        onclick='copyTitle(${JSON.stringify(fullData)})'>
        Copy
        </button>

        <button class="small-btn"
        onclick='saveTitle(${JSON.stringify(fullData)})'>
        Save
        </button>

      </div>

    </div>

    `;
  }

  saveHistory(generated);
}

function copyTitle(text){

  navigator.clipboard.writeText(text);

  alert("Title copied!");
}

function saveTitle(data){

  let saved =
  JSON.parse(localStorage.getItem("savedTitles")) || [];

  saved.push(data);

  localStorage.setItem(
    "savedTitles",
    JSON.stringify(saved)
  );

  loadSaved();
}

function loadSaved(){

  let saved =
  JSON.parse(localStorage.getItem("savedTitles")) || [];

  const container =
  document.getElementById("savedTitles");

  container.innerHTML = "";

  saved.forEach(item => {

    container.innerHTML += `
      <div class="mini-card">
        <pre style="white-space:pre-wrap;color:white">${item}</pre>
      </div>
    `;
  });
}

function saveHistory(data){

  let history =
  JSON.parse(localStorage.getItem("titleHistory")) || [];

  history.unshift({
    date:new Date().toLocaleString(),
    data:data
  });

  localStorage.setItem(
    "titleHistory",
    JSON.stringify(history)
  );

  loadHistory();
}

function loadHistory(){

  let history =
  JSON.parse(localStorage.getItem("titleHistory")) || [];

  const container =
  document.getElementById("history");

  container.innerHTML = "";

  history.slice(0,10).forEach(item => {

    let html = item.data.map(d => `
      <pre style="white-space:pre-wrap;color:white">
${d}
      </pre>
    `).join("");

    container.innerHTML += `

      <div class="mini-card">

        <strong>${item.date}</strong>

        <div style="margin-top:10px">
          ${html}
        </div>

      </div>

    `;
  });
}

loadSaved();
loadHistory();

</script>

</body>
</html>
