<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prompt Generator</title>

<link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="container generator-container">

<h1 class="page-title">✨ Prompt Generator</h1>

<div class="controls">

<select id="genre">
  <option>Horror</option>
  <option>Science</option>
  <option>Finance</option>
</select>

<button onclick="generatePrompts()">
Generate Prompts
</button>

</div>

<div class="results-grid" id="results"></div>

</div>

<script>

const promptData = {

  Horror:[
    "cinematic haunted forest, ultra realistic",
    "terrifying monster inside abandoned hospital"
  ],

  Science:[
    "futuristic laboratory, advanced robot, cinematic lighting",
    "NASA space station, ultra realistic"
  ],

  Finance:[
    "luxury businessman, cinematic office, money stacks",
    "crypto millionaire, luxury mansion"
  ]

};

function randomItem(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function generatePrompts(){

  const genre =
  document.getElementById("genre").value;

  const data =
  promptData[genre];

  const results =
  document.getElementById("results");

  results.innerHTML = "";

  for(let i=0;i<5;i++){

    const prompt =
    randomItem(data);

    results.innerHTML += `

    <div class="result-card">

      <div class="result-box">
        ${prompt}
      </div>

    </div>

    `;
  }
}

</script>

</body>
</html>
