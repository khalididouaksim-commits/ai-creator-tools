<!-- generators/prompt-generator.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AI Prompt Generator</title>

  <link rel="stylesheet" href="../style.css">

  <style>

    body{
      background:#050816;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    .container{
      max-width:1000px;
      margin:auto;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
    }

    .controls{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
    }

    select,button{
      padding:14px;
      border:none;
      border-radius:12px;
      background:#111827;
      color:white;
      font-size:16px;
    }

    button{
      cursor:pointer;
      background:linear-gradient(90deg,#7c3aed,#06b6d4);
      font-weight:bold;
    }

    .prompts-grid{
      display:grid;
      gap:20px;
      margin-top:35px;
    }

    .prompt-card{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:18px;
      padding:20px;
    }

    .prompt-text{
      line-height:1.8;
      font-size:17px;
      margin-bottom:15px;
      white-space:pre-line;
    }

    .card-buttons{
      display:flex;
      gap:10px;
    }

    .small-btn{
      flex:1;
      padding:10px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#1f2937;
      color:white;
    }

    .section{
      margin-top:50px;
    }

    .section-title{
      margin-bottom:20px;
      font-size:24px;
    }

    .mini-card{
      background:#0f172a;
      border:1px solid #1e293b;
      padding:15px;
      border-radius:14px;
      margin-bottom:12px;
    }

  </style>

</head>
<body>

<div class="container">

  <h1>🎬 AI Prompt Generator</h1>

  <div class="controls">

    <select id="genre">
      <option>Horror</option>
      <option>Sci-Fi</option>
      <option>Mystery</option>
      <option>Fantasy</option>
      <option>Historical</option>
      <option>Action</option>
      <option>Documentary</option>
      <option>Funny</option>
    </select>

    <select id="style">
      <option>Cinematic</option>
      <option>Hyper Realistic</option>
      <option>Dark</option>
      <option>Anime</option>
      <option>Vintage</option>
      <option>Dreamcore</option>
    </select>

    <select id="platform">
      <option>Veo3</option>
      <option>Midjourney</option>
      <option>YouTube Shorts</option>
      <option>TikTok</option>
      <option>Instagram Reels</option>
    </select>

    <button onclick="generatePrompts()">
      Generate 5 Prompts
    </button>

  </div>

  <div class="prompts-grid" id="promptsGrid"></div>

  <div class="section">

    <h2 class="section-title">⭐ Saved Prompts</h2>

    <div id="savedPrompts"></div>

  </div>

  <div class="section">

    <h2 class="section-title">🕘 Prompt History</h2>

    <div id="history"></div>

  </div>

</div>

<script>

const scenes = [
  "abandoned laboratory",
  "mysterious dark forest",
  "futuristic city",
  "ancient underground temple",
  "secret military base",
  "stormy mountain",
  "forgotten civilization",
  "haunted hospital"
];

const cameraShots = [
  "cinematic wide shot",
  "dramatic close-up",
  "aerial drone shot",
  "tracking camera movement",
  "handheld realistic shot"
];

const lighting = [
  "moody lighting",
  "dramatic shadows",
  "neon glow",
  "volumetric fog lighting",
  "golden cinematic lighting"
];

const atmosphere = [
  "intense atmosphere",
  "suspenseful mood",
  "dark emotional tone",
  "epic cinematic energy",
  "dreamlike environment"
];

const details = [
  "ultra detailed",
  "8k realistic",
  "high quality textures",
  "professional composition",
  "masterpiece quality"
];

function randomItem(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function generatePrompts(){

  const genre =
  document.getElementById("genre").value;

  const style =
  document.getElementById("style").value;

  const platform =
  document.getElementById("platform").value;

  const grid =
  document.getElementById("promptsGrid");

  grid.innerHTML = "";

  let generatedPrompts = [];

  for(let i=0; i<5; i++){

    let prompt = `
${randomItem(cameraShots)} of a ${genre} scene inside a ${randomItem(scenes)},
${style} style,
${randomItem(lighting)},
${randomItem(atmosphere)},
created for ${platform},
${randomItem(details)}
`;

    generatedPrompts.push(prompt);

    grid.innerHTML += `

      <div class="prompt-card">

        <div class="prompt-text">
          ${prompt}
        </div>

        <div class="card-buttons">

          <button class="small-btn"
          onclick='copyPrompt(${JSON.stringify(prompt)})'>
            Copy
          </button>

          <button class="small-btn"
          onclick='savePrompt(${JSON.stringify(prompt)})'>
            Save
          </button>

        </div>

      </div>

    `;
  }

  saveHistory(generatedPrompts);
}

function copyPrompt(text){

  navigator.clipboard.writeText(text);

  alert("Prompt copied!");
}

function savePrompt(prompt){

  let saved =
  JSON.parse(localStorage.getItem("savedPrompts")) || [];

  saved.push(prompt);

  localStorage.setItem(
    "savedPrompts",
    JSON.stringify(saved)
  );

  loadSavedPrompts();
}

function loadSavedPrompts(){

  let saved =
  JSON.parse(localStorage.getItem("savedPrompts")) || [];

  const container =
  document.getElementById("savedPrompts");

  container.innerHTML = "";

  saved.forEach(prompt => {

    container.innerHTML += `
      <div class="mini-card">
        ${prompt}
      </div>
    `;
  });
}

function saveHistory(prompts){

  let history =
  JSON.parse(localStorage.getItem("promptHistory")) || [];

  history.unshift({
    date:new Date().toLocaleString(),
    prompts:prompts
  });

  localStorage.setItem(
    "promptHistory",
    JSON.stringify(history)
  );

  loadHistory();
}

function loadHistory(){

  let history =
  JSON.parse(localStorage.getItem("promptHistory")) || [];

  const container =
  document.getElementById("history");

  container.innerHTML = "";

  history.slice(0,10).forEach(item => {

    let promptsHTML =
    item.prompts.map(p =>
      `<li>${p}</li>`
    ).join("");

    container.innerHTML += `
      <div class="mini-card">

        <strong>${item.date}</strong>

        <ul style="margin-top:10px">
          ${promptsHTML}
        </ul>

      </div>
    `;
  });
}

loadSavedPrompts();
loadHistory();

</script>

</body>
</html>
