<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hook Generator</title>

<link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="container generator-container">

<h1 class="page-title">🎣 Hook Generator</h1>

<div class="controls">

<select id="genre">
  <option>Horror</option>
  <option>Science</option>
  <option>Finance</option>
</select>

<button onclick="generateHooks()">
Generate Hooks
</button>

</div>

<div class="results-grid" id="results"></div>

</div>

<script>

const hookData = {

  Horror:[
    "Nobody survived this experiment...",
    "The camera captured something terrifying...",
    "This creature should not exist..."
  ],

  Science:[
    "Scientists discovered something impossible...",
    "This experiment changed physics forever...",
    "NASA found something terrifying in space..."
  ],

  Finance:[
    "He became rich overnight...",
    "This business made millions...",
    "The money secret nobody tells you..."
  ]

};

function randomItem(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateHooks(){

  const genre =
  document.getElementById("genre").value;

  const data =
  hookData[genre];

  const results =
  document.getElementById("results");

  results.innerHTML = "";

  for(let i=0;i<5;i++){

    const hook =
    randomItem(data);

    results.innerHTML += `

    <div class="result-card">

      <div class="result-title">
        ${hook}
      </div>

      <div class="card-buttons">

        <button class="small-btn"
        onclick="navigator.clipboard.writeText('${hook}')">
        Copy
        </button>

      </div>

    </div>

    `;
  }
}

</script>

</body>
</html>
