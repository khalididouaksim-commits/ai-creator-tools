<!-- generators/hook-generator.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hook Generator</title>

<link rel="stylesheet" href="../style.css">

<style>

body{
  background:#050816;
  color:white;
  font-family:Arial;
  padding:20px;
}

.container{
  max-width:1000px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

select,button{
  padding:14px;
  border:none;
  border-radius:12px;
  background:#111827;
  color:white;
  font-size:16px;
}

button{
  cursor:pointer;
  background:linear-gradient(90deg,#7c3aed,#06b6d4);
  font-weight:bold;
}

.hooks-grid{
  display:grid;
  gap:20px;
  margin-top:35px;
}

.hook-card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:18px;
  padding:20px;
}

.hook-text{
  line-height:1.8;
  font-size:20px;
  margin-bottom:15px;
}

.card-buttons{
  display:flex;
  gap:10px;
}

.small-btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#1f2937;
  color:white;
}

.section{
  margin-top:50px;
}

.section-title{
  margin-bottom:20px;
  font-size:24px;
}

.mini-card{
  background:#0f172a;
  border:1px solid #1e293b;
  padding:15px;
  border-radius:14px;
  margin-bottom:12px;
}

</style>

</head>
<body>

<div class="container">

<h1>🎣 AI Hook Generator</h1>

<div class="controls">

<select id="genre">
  <option>Horror</option>
  <option>Science</option>
  <option>Finance</option>
</select>

<select id="platform">
  <option>YouTube Shorts</option>
  <option>TikTok</option>
  <option>YouTube</option>
</select>

<button onclick="generateHooks()">
Generate 5 Hooks
</button>

</div>

<div class="hooks-grid" id="hooksGrid"></div>

<div class="section">

<h2 class="section-title">⭐ Saved Hooks</h2>

<div id="savedHooks"></div>

</div>

<div class="section">

<h2 class="section-title">🕘 Hook History</h2>

<div id="history"></div>

</div>

</div>

<script>

const hookData = {

  Horror:{
    hooks:[
      "Nobody survived this experiment...",
      "The camera captured something terrifying...",
      "This creature should not exist...",
      "They opened the wrong door...",
      "This video was never meant to be seen..."
    ]
  },

  Science:{
    hooks:[
      "Scientists discovered something impossible...",
      "This experiment changed physics forever...",
      "NASA found something terrifying in space...",
      "This machine should not exist...",
      "The results shocked the entire world..."
    ]
  },

  Finance:{
    hooks:[
      "He became rich overnight...",
      "This business made millions...",
      "The money secret nobody tells you...",
      "This investment changed his life...",
      "They became millionaires in one year..."
    ]
  }

};

function randomItem(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateHooks(){

  const genre =
  document.getElementById("genre").value;

  const data =
  hookData[genre];

  const grid =
  document.getElementById("hooksGrid");

  grid.innerHTML = "";

  let generatedHooks = [];

  for(let i=0;i<5;i++){

    const hook =
    randomItem(data.hooks);

    generatedHooks.push(hook);

    grid.innerHTML += `

    <div class="hook-card">

      <div class="hook-text">
        ${hook}
      </div>

      <div class="card-buttons">

        <button class="small-btn"
        onclick='copyHook(${JSON.stringify(hook)})'>
        Copy
        </button>

        <button class="small-btn"
        onclick='saveHook(${JSON.stringify(hook)})'>
        Save
        </button>

      </div>

    </div>

    `;
  }

  saveHistory(generatedHooks);
}

function copyHook(text){

  navigator.clipboard.writeText(text);

  alert("Hook copied!");
}

function saveHook(hook){

  let saved =
  JSON.parse(localStorage.getItem("savedHooks")) || [];

  saved.push(hook);

  localStorage.setItem(
    "savedHooks",
    JSON.stringify(saved)
  );

  loadSavedHooks();
}

function loadSavedHooks(){

  let saved =
  JSON.parse(localStorage.getItem("savedHooks")) || [];

  const container =
  document.getElementById("savedHooks");

  container.innerHTML = "";

  saved.forEach(hook => {

    container.innerHTML += `
      <div class="mini-card">
        ${hook}
      </div>
    `;
  });
}

function saveHistory(hooks){

  let history =
  JSON.parse(localStorage.getItem("hookHistory")) || [];

  history.unshift({
    date:new Date().toLocaleString(),
    hooks:hooks
  });

  localStorage.setItem(
    "hookHistory",
    JSON.stringify(history)
  );

  loadHistory();
}

function loadHistory(){

  let history =
  JSON.parse(localStorage.getItem("hookHistory")) || [];

  const container =
  document.getElementById("history");

  container.innerHTML = "";

  history.slice(0,10).forEach(item => {

    let hooksHTML =
    item.hooks.map(h =>
      `<li>${h}</li>`
    ).join("");

    container.innerHTML += `
      <div class="mini-card">

        <strong>${item.date}</strong>

        <ul style="margin-top:10px">
          ${hooksHTML}
        </ul>

      </div>
    `;
  });
}

loadSavedHooks();
loadHistory();

</script>

</body>
</html>
